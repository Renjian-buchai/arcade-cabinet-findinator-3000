<!DOCTYPE html>

<head>
  <title>Rhythm Game Finder-inator</title>
  {% include "elements/head.html" %}
  <style>
  @font-face {
    font-family: 'Outfit';
    src: url('static/Fonts/Outfit/Outfit-VariableFont_wght.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  
  body {
    background: url('static/gcm.webp');
    position: fixed;
    inset: 0;
    opacity: 0.8;

  }
  }
  </style>
</head>

<body>
  {% include "elements/header.html" %}
  <div style="margin:8px">
    <section>
      <form name="Select country" method="post">
        <label for="start">Country:
        </label>
        <select name="Country" id="Country">
          <option value="Select country" selected="SELECTED">Select country</option>
          {% for country in countries %}
            <option value="{{country}}">{{country}}</option>
          {% endfor %}
        </select>
        <input type="submit" name="Search">
      </form>
    </section>

    <section>
      <h1>Available countries:</h1>
      <ul>
        {% for country in countries %}
          <li>
            <a href="{{country}}">{{country}}</p>
          </li>
        {% endfor %}
      </ul>
    </section>
  </div>
</body>
