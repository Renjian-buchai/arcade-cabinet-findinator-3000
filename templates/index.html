<!DOCTYPE html>

<head>
  <title>Rhythm Game Finder-inator</title>
  {% include "head.html" %}
</head>

<body>
  {% include "header.html" %}
  <div style="margin:8px">
    <section>
      <form name="Select country" method="post">
        <label for="start">Country:
        </label>
        <select name="Country" id="Country">
          <option value="Select country" selected="SELECTED">Select country</option>
          {% for country in countries %}
            <option value="{{country}}">{{country}}</option>
          {% endfor %}
        </select>
        <input type="submit" name="Search">
      </form>
    </section>

    <section>
      <h1>Available countries:</h1>
      <ul>
        {% for country in countries %}
          <li>
            <a href="{{country}}">{{country}}</p>
          </li>
        {% endfor %}
      </ul>
    </section>
  </div>
</body>
