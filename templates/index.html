<!DOCTYPE html>

{% include "header.html" %}

<body>
  <h1>Rhythm Game Cabinet Finder-inator 2000</h1>

  <form name="Select country" method="post">
    <label for="start">Country:
    </label>
    <select name="Country" id="Country">
      <option value="Select country" selected="SELECTED">Select country</option>
      {% for country in countries %}
        <option value="{{country}}">{{country}}</option>
      {% endfor %}
    </select>
    <input type="submit" name="Search">
  </form>

  {% if selected_country != "" %}
    <h2>Results for
      {{selected_country}}</h2>
  {% endif %}

  {% for arcade in arcades %}
    <p>{{arcade}}</p>
  {% endfor %}

</body>
